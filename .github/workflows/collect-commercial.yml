# .github/workflows/collect-commercial.yml
# 네이버 부동산 상업용 매물 수집
# 수동 실행 전용 — Actions 탭 → Run workflow

name: 상업용 매물 수집

on:
  workflow_dispatch:
    inputs:
      sido:
        description: "시도 (서울/경기/인천, 비워두면 전체)"
        required: false
        default: ""
      trade:
        description: "거래유형 (A1=매매, B1=전세, B2=월세)"
        required: false
        default: "A1"

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: 매물 수집
        run: |
          SIDO_ARG=""
          TRADE_ARG="A1"

          if [ -n "${{ github.event.inputs.sido }}" ]; then
            SIDO_ARG="--sido ${{ github.event.inputs.sido }}"
          fi

          if [ -n "${{ github.event.inputs.trade }}" ]; then
            TRADE_ARG="${{ github.event.inputs.trade }}"
          fi

          python collect_commercial.py $SIDO_ARG --trade $TRADE_ARG --output data/commercial.json

      - name: 결과 확인
        run: |
          echo "=== 수집 결과 ==="
          if [ -f data/commercial.json ]; then
            python -c "
          import json
          with open('data/commercial.json', 'r') as f:
              d = json.load(f)
          print(f'업데이트: {d[\"updated\"]}')
          print(f'총 매물: {d[\"count\"]}건')
          types = {}
          for item in d['items']:
              t = item.get('typeName', '기타')
              types[t] = types.get(t, 0) + 1
          for t, c in sorted(types.items(), key=lambda x: -x[1]):
              print(f'  {t}: {c}건')
          "
          else
            echo "⚠ data/commercial.json 파일 없음"
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/commercial.json
          git diff --staged --quiet || git commit -m "📊 상업용 매물 업데이트 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
